services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    image: ${WEB_IMAGE:-vps-residual-calculator-web:local}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WEB_PORT:-18088}:8080"
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    image: ${API_IMAGE:-vps-residual-calculator-api:local}
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: "8080"
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:18088}
      SHARE_DIR: /data/share
    ports:
      - "127.0.0.1:${API_PORT:-18089}:8080"
    volumes:
      - share-data:/data/share
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  share-data:
